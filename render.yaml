# DICOMPUTE Render Deployment Configuration
# Free tier deployment for hackathon demo
# Deploy: Copy this to render.com blueprint or use CLI

services:
  # Frontend — Static Site (Free)
  - type: static
    name: dicompute-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID
        value: 21f16978fd430146fe7e908c6d64e8b7
      - key: NEXT_PUBLIC_JOB_ESCROW_ADDRESS
        value: 0x2Ff9B760510fc0aAd51a59f8aDA62F8B2631a075
      - key: NEXT_PUBLIC_GPU_REGISTRY_ADDRESS
        value: 0xCEf0f0E74e618A95Da97e1216F81d74eA01dE77C
      - key: NEXT_PUBLIC_PROOF_RECEIPT_ADDRESS
        value: 0xb35EfE4E7071B1c7ce7f00CC7BB667cEc706DBa2
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "51"
      - key: NEXT_PUBLIC_RPC_URL
        value: https://erpc.apothem.network
      - key: NEXT_PUBLIC_BLOCK_EXPLORER
        value: https://explorer.apothem.network
    routes:
      - type: rewrite
        source: /api/*
        destination: https://dicompute-api.onrender.com/api/*

  # Backend API — Web Service (Free)
  - type: web
    name: dicompute-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: "8001"
      - key: CORS_ORIGINS
        value: "https://dicompute-frontend.onrender.com,http://localhost:3000"
      - key: RPC_URL
        value: https://erpc.apothem.network
      - key: CHAIN_ID
        value: "51"
      - key: DATABASE_URL
        value: sqlite:///./dicompute.db
      # PINATA_JWT — set in Render dashboard (secret)
      # DEPLOYER_KEY — set in Render dashboard (secret)
    healthCheckPath: /health
