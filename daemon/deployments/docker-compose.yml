version: '3.8'

services:
  daemon:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: dicompute-daemon
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dicompute-data:/var/lib/dicompute/data
      - ./daemon.env:/etc/dicompute/daemon.env:ro
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DATA_VOLUME_PATH=/var/lib/dicompute/data
    ports:
      - "8080:8080"
    networks:
      - dicompute
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: dicompute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dicompute
      POSTGRES_PASSWORD: dicompute
      POSTGRES_DB: dicompute
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dicompute

volumes:
  dicompute-data:
  postgres-data:

networks:
  dicompute:
    driver: bridge